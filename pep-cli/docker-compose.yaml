version: '2.4'
services:
  app:
    container_name: "application-server"
    image: 'gitlabregistry.pep.cs.ru.nl/pep-public/core/ppp-acc' 
    restart: always
    volumes:
      - ..:/workspace:cached
    ports:
      - '8080:8080'
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
networks:
  app-network:
    external: true
