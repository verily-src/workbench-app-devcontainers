services:
  app:
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: "prod"
      USE_DEMO_TABLES: "true"
    networks:
      - app-network

networks:
  app-network:
    external: true
