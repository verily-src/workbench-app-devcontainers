services:
  app:
    # Workbench looks for this exact container name.
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      # WORKBENCH_USER_EMAIL is forwarded by the proxy layer in production;
      # X-Forwarded-User is the fallback path we already read in the app.
      APP_ENV: "prod"
      USE_DEMO_TABLES: "true"
    networks:
      - app-network

networks:
  app-network:
    external: true
