services:
  app:
    container_name: "application-server"
    build:
      context: .
    restart: always
    volumes:
      - .:/workspace:cached
    ports:
      - 8080:8080
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      AURORA_RESOURCE_ID: "${AURORA_RESOURCE_ID:-}"
      TSV_PATH: "${TSV_PATH:-s3://v0-saas-prod-us-west-2-workbench/GTEx_demo_folder-yp-copy-of-gtex-demo-project/GTEx_V8_sample_manifest_metadata.tsv}"

networks:
  app-network:
    external: true
