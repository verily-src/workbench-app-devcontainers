# Aligns with Verily Workbench custom-app requirements:
# https://github.com/vrajat44/workbench-app-devcontainers/blob/master/README.md
# — container_name "application-server", app-network (external), FUSE for gcsfuse.
services:
  app:
    # Required by Workbench (see workbench-app-devcontainers src/example/docker-compose.yaml)
    container_name: "application-server"
    build:
      context: .
    restart: always
    working_dir: /app
    command: ["./start.sh"]
    volumes:
      - .:/workspace:cached
    ports:
      - 8080:8080
    environment:
      - GCP_PROJECT_ID
      - DATA_PROJECT_ID
      - GEMINI_MODEL=gemini-2.5-flash
      - CHAT_MODEL
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

networks:
  # External network named "app-network" — Workbench creates it; for local compose run once:
  #   docker network create app-network
  app-network:
    external: true
