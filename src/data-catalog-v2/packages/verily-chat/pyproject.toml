[project]
name = "verily-chat"
version = "0.1.0"
description = "Chat over BigQuery metadata: Q&A from profiling output + optional NL-to-SQL agent"
requires-python = ">=3.11"
dependencies = [
    "verily-profiler",
    "google-genai>=1.0.0",
    "click>=8.0.0",
]

[project.optional-dependencies]
agent = [
    "google-cloud-bigquery>=3.25.0",
    "langchain-core>=0.3.0",
    "langchain-google-vertexai>=2.0.0",
    "langgraph>=0.2.0",
]

[project.scripts]
verily-chat = "verily_chat.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/verily_chat"]
