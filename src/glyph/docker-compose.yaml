version: '3.8'

services:
  app:
    image: python:3.11-slim
    working_dir: /workspace
    command: >
      bash -c "
      pip install --no-cache-dir Flask Werkzeug google-cloud-bigquery google-cloud-storage &&
      python app_demo.py
      "
    ports:
      - "80:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/workspace
