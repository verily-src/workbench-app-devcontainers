version: '2.4'
services:
  app:
    container_name: "application-server"
    image: "us-west2-docker.pkg.dev/shared-pub-buckets-94mvrf/workbench-artifacts/app-aou-jupyter@sha256:bd995ffb80b8b1b14f122b6ceb9e66c2037bbb9b182b4501c61b944cef4220a2"
    user: "jupyter"
    restart: always
    volumes:
      - .:/workspace:cached
      - ./wb:/usr/bin/wb:ro
      - /tmp/wb-mount:/home/jupyter/workspace:slave
      - ssh-keys:/ssh-keys
    ports:
      - '8888:8888'
    networks:
      - app-network
    depends_on:
      - wondershaper
      - wbcli
  wondershaper:
    container_name: "wondershaper"
    image: "us-west2-docker.pkg.dev/shared-pub-buckets-94mvrf/workbench-artifacts/app-wondershaper@sha256:dd9df1811b9d15f4f8d95b6e515a2371e12d238240b8ef7359be77d961e79e3a"
    restart: always
    network_mode: "host"
    cap_add:
      - NET_ADMIN
  wbcli:
    container_name: "wbcli"
    image: "wbcli:local"
    restart: always
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - ssh-keys:/ssh-keys
      - /tmp/wb-mount:/home/wbcli/workspace:shared
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      CLOUD: ${templateOption:cloud}
      LOG_IN: ${templateOption:login}
networks:
  app-network:
    external: true
volumes:
  ssh-keys:
