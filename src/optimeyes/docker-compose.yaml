version: "2.4"
services:
  app:
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    # restart: always
    volumes:
      - .:/workspace:cached
      - work:/config:cached
      - data:/workspace/data:cached
      - ./workspace/flask_server:/flask_server
      - ./workspace/Image-Comparator-Data:/Image-Comparator-Data 
    working_dir: /workspace/flask_server
    env_file:
      - .env
    environment:
      - FLASK_APP=${FLASK_APP}
      - IMAGE_COMPARATOR_DATA=${IMAGE_COMPARATOR_DATA}
      - DNS=${DNS}
      - SSL=${SSL}
      - DB_PORT=${DB_PORT}
      - HTTP_PORT=${HTTP_PORT}
      - DEPLOY=${DEPLOY}
      - COUCH_DB=${COUCH_DB}
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
      - ADMIN_PARTY=${ADMIN_PARTY}
      - SECRET_KEY=${SECRET_KEY}
    command: bash -c "/workspace/flask_server/OPTIMEyes/utils/setup.sh"
    ports:
      - ${HTTP_PORT}:8080
    # The service must be connected to the "app-network" Docker network
    networks:
      - app-network
    depends_on:
      - couchdb
    # SYS_ADMIN and fuse are required to mount workspace resources into the
    # container.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

  couchdb:
    container_name: "couchdb-server"
    image: couchdb:latest
    restart: always
    ports:
      - "5984:5984"
    env_file:
      - .env
    environment:
      COUCHDB_USER: "${COUCHDB_USER}"
      COUCHDB_PASSWORD: "${COUCHDB_PASSWORD}"
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./workspace/flask_server:/flask_server
    networks:
      - app-network

  monailabel:
    build:
      context: ./OPTIMEyes/monailabel
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./monailabel:/monailabel
    stdin_open: true
    tty: true
    # working_dir: /monailabel
    environment:
      - MONAI_LABEL_ENV=development
    command: monailabel start_server --app apps/monaibundle --studies datastore --conf bundles IntegrationBundle,SegformerBundle,MedSamBundle --conf zoo_source ngc
    # command: bash

networks:
  app-network:
    external: true

volumes:
  work:
  data:
  couchdb_data:
  flask_server:
  monailabel:
