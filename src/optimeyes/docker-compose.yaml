version: "2.4"
include:
  - path:
    - ./OPTIMEyes/docker-compose.yml
services:
  app:
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - .:/workspace:cached
      - work:/config:cached
      - data:/workspace/data:cached
    ports:
      - "80:80"
      - "5000:5000"
      - "5984:5984"
      - "8000:8000"
    env_file:
      - .env
    environment:
      FLASK_APP: "OPTIMEyes"
      IMAGE_COMPARATOR_DATA: "/workspace/Image-Comparator-Data"
      DNS: "0.0.0.0"
      SSL: "False"
      DB_PORT: "5984"
      HTTP_PORT: "80"
      DEPLOY: "DEV"
      ADMIN_PARTY: "False"
      SECRET_KEY: "${SECRET_KEY}"
      COUCHDB_USER: "${COUCHDB_USER}"
      COUCHDB_PASSWORD: "${COUCHDB_PASSWORD}"
      COUCH_DB: "image_comparator"
      MONAI_LABEL_ENV: "development"
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      - monailabel
      - flask
      - couchdb
    command: tail -f /dev/null

