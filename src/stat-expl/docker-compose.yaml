services:
  app:
    # Workbench looks for this exact container name.
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: "prod"
    networks:
      - app-network

networks:
  app-network:
    external: true
