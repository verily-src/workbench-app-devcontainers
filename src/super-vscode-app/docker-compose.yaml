services:
  app:
    container_name: "application-server"
    image: "us-central1-docker.pkg.dev/wb-beamish-lettuce-5001/shared-repo/base-image:2.6.0"
    restart: always
    entrypoint: /bin/bash
    command: >
      -c "/usr/bin/workstation-startup || true; runuser user -c 'sleep infinity'"
    volumes:
      - .:/workspace:cached
      - work:/home/user:cached
      - crowdstrike-falcon-volume:/tmp/CrowdStrike:ro
    ports:
      - "8080:80"
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor=unconfined
    depends_on:
      - falcon-sensor

  falcon-sensor:
    container_name: "crowdstrike-falcon-sensor"
    image: "falcon-sensor/falcon-container:latest"
    restart: always
    privileged: false
    cap_add:
      - SYS_PTRACE
    pid: "service:app"
    networks:
      - app-network
    volumes:
      - crowdstrike-falcon-volume:/tmp/CrowdStrike
      - work:/home/user:ro
    environment:
      - FALCONCTL_OPT_CID=${FALCONCTL_OPT_CID}
    env_file:
      - .env

networks:
  app-network:
    external: true

volumes:
  work:
  crowdstrike-falcon-volume:
