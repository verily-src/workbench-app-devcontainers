services:
  app:
    # The container name must be "application-server"
    container_name: "application-server"
    # This can be either a pre-existing image or built from a Dockerfile
    image: "ubuntu:24.04"
    # An unmodified Ubuntu image will exit immediately without a running process.
    # If you are just testing it out, you can keep it alive with:
    tty: true
    restart: always
    volumes:
      - .:/workspace:cached
      - work:/home/abc/work
    command: ["ttyd", "-W", "-p", "2222", "bash"]
    # The port specified here will be forwarded and accessible from the
    # Workbench UI.
    ports:
      - 8822:2222
      - 8443:8443
    environment:
      USER: "abc"
      DEFAULT_WORKSPACE: "/config"
      SUDO_PASSWORD: "pwd"
    # The service must be connected to the "app-network" Docker network
    networks:
      - app-network
    # SYS_ADMIN and fuse are required to mount workspace resources into the
    # container.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

volumes:
  work:

networks:
  # The Docker network must be named "app-network". This is an external network
  # that is created outside of this docker-compose file.
  app-network:
    external: true
