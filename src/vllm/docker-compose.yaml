services:
  app:
    container_name: "application-server"
    build:
      context: .
      dockerfile: Dockerfile
      target: code-server
    restart: always
    volumes:
      - .:/workspace:cached
      - work:/config:cached
    ports:
      - "8443:8443"
    environment:
      USER: "abc"
      DEFAULT_WORKSPACE: "/config"
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

  vllm:
    build:
      context: .
      dockerfile: Dockerfile
      target: vllm
    restart: always
    volumes:
      - models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    networks:
      - app-network
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model meta-llama/Llama-3.2-3B-Instruct
      --host 0.0.0.0
      --port 8000
      --max-model-len 2048
      --device cpu
      --dtype bfloat16

networks:
  app-network:
    external: true
volumes:
  work:
  models:
