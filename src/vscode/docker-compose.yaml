version: "2.4"
services:
  app:
    container_name: "application-server"
    image: "lscr.io/linuxserver/code-server@sha256:1f384394d473c43ab6a39b2227ba3aa9c95af648ce3a67e1b4da1969c16c7c0d"
    restart: always
    volumes:
      - .:/workspace:cached
      - work:/home/vscode:cached
    ports:
      - "8443:8443"
    environment:
      USER: "abc"
      DEFAULT_WORKSPACE: "/config"
      SUDO_PASSWORD: "pwd"
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
networks:
  app-network:
    external: true
volumes:
  work:
