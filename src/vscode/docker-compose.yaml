version: "2.4"
services:
  app:
    container_name: "application-server"
    image: "lscr.io/linuxserver/code-server@sha256:111275f3c11a51d1d2ad675bfca531677ee6d54ec89e86e78d5b9dcc1a40c6f0"
    restart: always
    volumes:
      - .:/workspace:cached
      - work:/home/vscode:cached
    ports:
      - "8443:8443"
    environment:
      USER: "abc"
      DEFAULT_WORKSPACE: "/config"
      SUDO_PASSWORD: "pwd"
    networks:
      - app-network
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
networks:
  app-network:
    external: true
volumes:
  work:
